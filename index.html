<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Personal | Juliana</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f8fafc;
            margin: 0;
            overflow-x: hidden;
        }
        .bg-brand-main {
            background-color: #fe5126;
        }
        .text-brand-main {
            color: #fe5126;
        }
        .bg-brand-dark {
            background-color: #1a202c;
        }
        /* Diseño geométrico del lateral izquierdo */
        .geometric-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 35%;
            height: 100%;
            background-color: #fe5126;
            z-index: -1;
            clip-path: polygon(0 0, 100% 0, 70% 100%, 0% 100%);
        }
        .geometric-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 25%;
            height: 100%;
            background-color: #1a202c;
            z-index: -1;
            clip-path: polygon(0 0, 100% 0, 40% 50%, 0 50%);
        }
        .geometric-accent {
            position: fixed;
            bottom: 15%;
            left: 5%;
            width: 200px;
            height: 200px;
            background-color: #ffffff;
            z-index: -1;
            transform: rotate(25deg);
            opacity: 0.9;
        }
        
        .login-card {
            margin-left: 35%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 5rem;
        }
        
        .input-icon-container {
            position: relative;
        }
        .input-icon-container svg {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
        }
        .input-field {
            padding-left: 40px !important;
        }
        
        /* Ocultar el icono de contraseña nativo de los navegadores */
        input::-ms-reveal,
        input::-ms-clear {
            display: none;
        }
        
        @media (max-width: 768px) {
            .geometric-bg, .geometric-overlay, .geometric-accent {
                display: none;
            }
            .login-card {
                margin-left: 0;
                padding: 2rem;
            }
        }
    </style>
</head>
<body>
    <!-- Elementos decorativos del fondo -->
    <div class="geometric-bg"></div>
    <div class="geometric-overlay"></div>
    <div class="geometric-accent"></div>

    <div class="login-card">
        <!-- Header / Logo -->
        <div class="flex items-center w-full">
            <div class="flex items-center space-x-3">
                <img src="C:/Users/tonny/Downloads/1sdas.png" alt="Logo" class="h-10 object-contain">
                <div class="flex flex-col border-l border-gray-200 pl-3">
                    <span class="text-2xl font-bold text-[#1a202c] leading-none">FJAT</span>
                    <span class="text-[10px] tracking-widest text-[#fe5126] font-bold">Mecanindustria</span>
                </div>
            </div>
        </div>

        <!-- Contenedor del Formulario (Centrado verticalmente) -->
        <div class="flex-grow flex flex-col justify-center max-w-md w-full py-12">
            <h1 class="text-3xl font-bold text-[#1a202c] mb-2">¡Buenos días!</h1>
            <p class="text-gray-500 mb-8 leading-relaxed">
                Completa los siguientes datos para poder acceder a tu área personal
            </p>

            <form id="loginForm" class="space-y-6">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Usuario / Email</label>
                    <div class="input-icon-container">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.206"></path>
                        </svg>
                        <input type="text" id="username" required
                            class="input-field w-full px-4 py-3 border border-gray-300 rounded-md focus:ring-1 focus:ring-[#fe5126] focus:border-[#fe5126] outline-none transition text-gray-700"
                            placeholder="Usuario de acceso">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Contraseña</label>
                    <div class="input-icon-container">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                        </svg>
                        <input type="password" id="password" required
                            class="input-field w-full px-4 py-3 border border-gray-300 rounded-md focus:ring-1 focus:ring-[#fe5126] focus:border-[#fe5126] outline-none transition text-gray-700"
                            placeholder="Introduce la contraseña">
                        <button type="button" id="togglePassword" class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-[#fe5126]">
                            <svg id="eyeIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="flex items-center justify-between">
                    <a href="#" class="text-xs text-gray-500 hover:underline">¿No recuerdas tus credenciales? <span class="text-[#1a202c] font-bold">Recupéralas ></span></a>
                </div>

                <div class="flex items-center">
                    <input type="checkbox" id="remember" class="w-4 h-4 text-[#fe5126] border-gray-300 rounded focus:ring-[#fe5126]">
                    <label for="remember" class="ml-2 text-sm text-gray-600">Recordar accesos</label>
                </div>

                <button type="submit"
                    class="w-full bg-[#fe5126] text-white py-3 rounded-md font-bold hover:bg-[#e4461f] transition duration-300 flex items-center justify-center space-x-2 shadow-lg">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                    </svg>
                    <span>Acceder</span>
                </button>
            </form>
            <div id="message" class="mt-4 text-center text-sm hidden"></div>
        </div>

        <!-- Footer -->
        <div class="pb-4 flex flex-wrap items-center text-[10px] text-gray-400 space-x-4 w-full">
            <span>© 2026 FJAT Mecanindustria S.A.C.</span>
            <a href="#" class="hover:underline">Soporte</a>
            <a href="#" class="hover:underline">Privacidad</a>
            <a href="#" class="hover:underline">Configuración de las cookies</a>
            <div class="flex-grow"></div>
            <div class="flex items-center space-x-4 opacity-50">
                <span class="font-bold text-gray-600">workspace</span>
                <span class="font-bold text-gray-600 italic">tesis</span>
            </div>
        </div>
    </div>
    </div>

    <script>
        const togglePassword = document.querySelector('#togglePassword');
        const password = document.querySelector('#password');
        const eyeIcon = document.querySelector('#eyeIcon');

        togglePassword.addEventListener('click', function () {
            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
            password.setAttribute('type', type);
            if (type === 'text') {
                eyeIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18"></path>';
            } else {
                eyeIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>';
            }
        });

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const messageDiv = document.getElementById('message');

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });

                const data = await response.json();

                if (data.success) {
                    messageDiv.textContent = `¡Bienvenida ${data.user.name}! Redirigiendo...`;
                    messageDiv.className = 'mt-4 text-center text-sm font-medium text-green-600';
                    messageDiv.classList.remove('hidden');
                    setTimeout(() => { 
                        window.location.href = 'dashboard.html';
                    }, 800);
                } else {
                    messageDiv.textContent = 'Las credenciales introducidas no son correctas.';
                    messageDiv.className = 'mt-4 text-center text-sm font-medium text-red-600';
                    messageDiv.classList.remove('hidden');
                }
            } catch (err) {
                messageDiv.textContent = 'Error al conectar con el servidor.';
                messageDiv.className = 'mt-4 text-center text-sm font-medium text-red-600';
                messageDiv.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
